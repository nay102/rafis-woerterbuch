<!doctype html>
<html lang="en">
  <head>
    <!-- ================= META ================= -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO BASIC -->
    <meta
      name="description"
      content="German – Bangla – English Learning Platform"
    />
    <meta name="theme-color" content="#111827" />

    <title>Deutsches Wörterbuch</title>

    <!-- ================= FAVICON ================= -->
    <link rel="icon" type="image/png" href="assets/favicon.png" />

    <!-- ================= GOOGLE FONT ================= -->
    <!-- Premium typography -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ================= MAIN CSS ================= -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- ========================================================= -->
    <!-- ===================== HEADER ============================ -->
    <!-- ========================================================= -->
    <header class="header">
      <div class="container header-inner">
        <!-- LEFT: Logo + Site Name -->

        <div class="logo-area" id="logoHome">
          <button id="desktopMenuBtn" class="desktop-menu-btn">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <img src="assets/logo.png" alt="Logo" class="logo" />
          <span id="titleHome" class="site-title"> Rafi’s Wörterbuch</span>
        </div>

        <!-- CENTER: Branding -->
        <div class="branding">Deutsches Wörterbuch</div>

        <!-- RIGHT: Controls -->
        <div class="header-controls">
          <button id="darkToggle" aria-label="Toggle Dark Mode">🌙</button>
          <button id="loginBtn">Login</button>
          <button id="mobileMenuBtn" class="mobile-menu-btn">☰</button>
        </div>
      </div>
    </header>

    <!-- ========================================================= -->
    <!-- ===================== HERO SECTION ====================== -->
    <!-- ========================================================= -->
    <!-- Visible only on homepage -->
    <section class="hero" id="heroSection" style="display: none">
      <!-- Hero Title -->
      <div class="hero-title">
        <h1>Rafi’s Wörterbuch</h1>
        <!-- <p>Deutsch einfach erklärt – auf Deutsch, Englisch und Bengali</p> -->
        <p>Ausführliche Erklärungen auf Deutsch, Englisch und Bengali</p>
      </div>

      <!-- ================= SEARCH AREA ================= -->
      <div class="search-container">
        <!-- Search Input -->
        <input
          type="text"
          id="searchInput"
          placeholder="Search word..."
          autocomplete="off"
        />
        <div id="homeSuggestions" class="suggestions-box"></div>
      </div>

      <!-- Search Message -->
      <div id="searchMessage" class="search-message"></div>

      <!-- Word Counter -->
      <div id="wordCount" class="word-counter"></div>
      <!-- ================= JSON IMPORT ================= -->

      <div id="importMessage"></div>
    </section>

    <!-- ========================================================= -->
    <!-- ===================== HOME PAGE ========================= -->
    <!-- ========================================================= -->
    <!-- Only category navigation appears here -->
    <main id="homePage">
      <!-- Category Navigation Buttons generated by JS -->
      <nav class="category-nav" id="categoryNav"></nav>
    </main>

    <!-- ========================================================= -->
    <!-- ================= CATEGORY PAGE ========================= -->
    <!-- ========================================================= -->
    <!-- Words appear vertically here -->
    <section id="categoryPage" style="display: none"></section>

    <!-- ========================================================= -->
    <!-- ================= WORD DETAIL PAGE ====================== -->
    <!-- ========================================================= -->
    <section id="wordDetailPage" style="display: none"></section>
    <section id="desktopPage" style="display: none"></section>

    <!-- ========================================================= -->
    <!-- ================= AUTH MODAL ============================ -->
    <!-- ========================================================= -->
    <div id="authModal" class="hidden modal-overlay">
      <div class="modal-box">
        <!-- Close Button -->
        <span id="closeAuth" class="close-btn">✖</span>

        <h2 id="authTitle">Login</h2>

        <!-- Error Message -->
        <div id="authError" class="auth-error"></div>

        <!-- Login / Signup Form -->
        <form id="authForm">
          <input id="authEmail" type="email" placeholder="Email" required />

          <input
            id="authPassword"
            type="password"
            placeholder="Password"
            required
          />

          <button type="submit" id="authSubmitBtn">Login</button>
        </form>

        <!-- Switch Mode -->
        <p class="switch-text">
          <span id="switchText">Don't have an account?</span>
          <button type="button" id="switchModeBtn">Sign Up</button>
        </p>
      </div>
    </div>

    <!-- ========================================================= -->
    <!-- ===================== FOOTER ============================ -->
    <!-- ========================================================= -->
    <footer class="footer">
      <p>Thanks for visiting ❤️</p>

      <div class="footer-links">
        <a
          href="https://www.facebook.com/profile.php?id=61587780268691"
          target="_blank"
          rel="noopener"
          >Facebook</a
        >
        <a
          href="https://www.instagram.com/nayeem_3378/"
          target="_blank"
          rel="noopener"
          >Instagram</a
        >
        <a
          href="https://www.tiktok.com/@deutschwelt.nayeem?lang=en"
          target="_blank"
          rel="noopener"
          >TikTok</a
        >
        <a href="https://wa.me/8801988064328" target="_blank" rel="noopener"
          >WhatsApp</a
        >
        <a href="https://x.com/nayeem_i44487" target="_blank" rel="noopener"
          >X</a
        >
      </div>
    </footer>
    <!-- ========================================================= -->
    <!-- ===================== MAIN JS =========================== -->
    <!-- ========================================================= -->

    <!-- Desktop side navigation -->
    <div id="desktopSidePanel" class="desktop-side-panel">
      <div class="desktop-panel-content">
        <span id="desktopClosePanel" class="desktop-close">✖</span>

        <button data-page="home">🏠 Home</button>
        <button data-page="owner">👑 Owner</button>
        <button data-page="ausbildung">📚 Ausbildung</button>
        <button data-page="about">🇩🇪 Germany</button>
        <button data-page="option4">🧠 Practice Lab</button>
        <button data-page="option5">📝 Exam Zone</button>
        <button data-page="option6">🚀 Pro Tools</button>
        <!-- Account utility pages -->
        <button data-page="settings">⚙ Settings</button>
        <button data-page="favorites">⭐ Favorites</button>
        <button data-page="logout">🚪 Logout</button>
      </div>
    </div>
    <!-- Mobile side navigation -->
    <div id="mobileSidePanel" class="mobile-side-panel">
      <div class="panel-content">
        <span id="closePanel" class="close-panel">✖</span>

        <button data-page="home">🏠 Home</button>
        <button data-page="owner">👑 Owner</button>
        <button data-page="ausbildung">📚 Ausbildung</button>
        <button data-page="about">🇩🇪 Germany</button>
        <button data-page="option4">🧠 Practice Lab</button>
        <button data-page="option5">📝 Exam Zone</button>
        <button data-page="option6">🚀 Pro Tools</button>

        <button id="panelDarkToggle">🌙 Dark Mode</button>
        <button id="panelLoginBtn">Login</button>

        <button data-page="logout">🚪 Logout</button>
        <!-- Account utility pages -->
        <button data-page="settings">⚙ Settings</button>
        <button data-page="favorites">⭐ Favorites</button>
      </div>
    </div>

    <!-- User profile modal -->
    <div id="userInfoModal" class="hidden modal-overlay">
      <div class="modal-box user-modal-box">
        <span id="closeUserInfo" class="close-btn">✖</span>
        <h2>👤 User Profile</h2>
        <div id="userInfoContent" class="user-info-content"></div>
      </div>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
